<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🐍 Python Remote Executor</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen font-mono">

  <!-- ── HEADER ─────────────────────────────────────────────── -->
  <header class="bg-gray-900 border-b border-gray-800 px-6 py-3 flex items-center justify-between sticky top-0 z-50 shadow-lg">
    <div class="flex items-center gap-3">
      <span class="text-2xl">🐍</span>
      <span class="text-lg font-bold text-green-400 tracking-tight">Python Remote Executor</span>
    </div>
    <div class="flex items-center gap-4 text-sm">
      <span id="active-badge" class="flex items-center gap-1.5 text-gray-400">
        <span class="w-2 h-2 rounded-full bg-gray-600"></span>
        <span id="active-count">0개 실행 중</span>
      </span>
      <button onclick="App.refreshAll()" class="px-3 py-1 rounded bg-gray-800 hover:bg-gray-700 text-gray-300 hover:text-white transition text-xs">
        ↺ 새로고침
      </button>
    </div>
  </header>

  <!-- ── MAIN LAYOUT ────────────────────────────────────────── -->
  <div class="flex h-[calc(100vh-57px)]">

    <!-- LEFT SIDEBAR: Job 목록 -->
    <aside class="w-72 flex-shrink-0 bg-gray-900 border-r border-gray-800 overflow-y-auto flex flex-col">
      <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
        <span class="text-sm font-semibold text-gray-300">📋 Job 목록</span>
        <span id="job-count" class="text-xs text-gray-500">0개</span>
      </div>

      <!-- 태그 필터 -->
      <div class="px-4 py-2 border-b border-gray-800">
        <div id="tag-filters" class="flex flex-wrap gap-1.5"></div>
      </div>

      <!-- Job 목록 -->
      <div id="job-list" class="flex-1 px-2 py-2 space-y-1">
        <p class="text-gray-500 text-xs px-2 py-4 text-center">로딩 중...</p>
      </div>
    </aside>

    <!-- CENTER: 로그 뷰어 + 실행 현황 -->
    <main class="flex-1 flex flex-col overflow-hidden">

      <!-- 실행 패널 (선택된 Job 없으면 안내 표시) -->
      <div id="run-panel" class="flex-1 flex flex-col overflow-hidden">
        <!-- 기본: 안내 화면 -->
        <div id="welcome-view" class="flex-1 flex items-center justify-center text-gray-600">
          <div class="text-center space-y-3">
            <div class="text-5xl">🐍</div>
            <p class="text-lg font-semibold text-gray-500">Job을 선택하세요</p>
            <p class="text-sm text-gray-600">왼쪽 목록에서 실행할 Job을 클릭하면<br/>여기에 실행 패널이 표시됩니다.</p>
          </div>
        </div>

        <!-- Job 실행 뷰 -->
        <div id="job-view" class="hidden flex-1 flex flex-col overflow-hidden">

          <!-- Job 헤더 -->
          <div class="bg-gray-900 border-b border-gray-800 px-5 py-3 flex items-center justify-between">
            <div>
              <div class="flex items-center gap-2">
                <span id="jv-name" class="font-bold text-green-400 text-base"></span>
                <span id="jv-tags" class="flex gap-1"></span>
              </div>
              <p id="jv-desc" class="text-xs text-gray-500 mt-0.5"></p>
            </div>
            <button id="btn-run" onclick="App.openRunModal()"
              class="px-4 py-1.5 bg-green-600 hover:bg-green-500 text-white rounded font-semibold text-sm transition flex items-center gap-1.5">
              ▶ 실행
            </button>
          </div>

          <!-- 실행 중인 프로세스 목록 -->
          <div class="bg-gray-950 border-b border-gray-800 px-5 py-2">
            <div id="active-processes" class="flex flex-wrap gap-2">
              <span class="text-xs text-gray-600">실행 중인 프로세스 없음</span>
            </div>
          </div>

          <!-- 로그 뷰어 -->
          <div class="flex-1 overflow-hidden flex flex-col">
            <div class="flex items-center justify-between px-5 py-2 bg-gray-900 border-b border-gray-800">
              <div class="flex items-center gap-2">
                <span class="text-xs text-gray-400 font-semibold">📋 로그</span>
                <span id="log-run-id" class="text-xs text-gray-600"></span>
                <span id="log-status-badge" class="hidden"></span>
              </div>
              <div class="flex gap-2">
                <button onclick="App.toggleAutoScroll()"
                  id="btn-autoscroll" title="자동 스크롤"
                  class="px-2 py-0.5 rounded text-xs bg-gray-800 hover:bg-gray-700 text-gray-400 transition">
                  ↓ 자동스크롤 ON
                </button>
                <button onclick="App.clearLog()"
                  class="px-2 py-0.5 rounded text-xs bg-gray-800 hover:bg-gray-700 text-gray-400 transition">
                  지우기
                </button>
              </div>
            </div>
            <div id="log-viewer"
              class="flex-1 overflow-y-auto px-5 py-3 text-xs leading-5 text-green-300 bg-gray-950 font-mono">
              <p class="text-gray-600">아직 실행된 로그가 없습니다. ▶ 실행 버튼을 누르세요.</p>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- RIGHT SIDEBAR: 실행 이력 -->
    <aside class="w-80 flex-shrink-0 bg-gray-900 border-l border-gray-800 overflow-y-auto flex flex-col">
      <div class="px-4 py-3 border-b border-gray-800 flex items-center justify-between">
        <span class="text-sm font-semibold text-gray-300">📜 실행 이력</span>
        <button onclick="App.loadHistory()" class="text-xs text-gray-500 hover:text-gray-300 transition">↺</button>
      </div>
      <div id="history-list" class="flex-1 px-2 py-2 space-y-1">
        <p class="text-gray-500 text-xs px-2 py-4 text-center">이력 없음</p>
      </div>
      <div class="border-t border-gray-800 px-4 py-2 flex justify-center">
        <button id="history-more-btn" onclick="App.loadMoreHistory()" class="text-xs text-gray-500 hover:text-gray-300 hidden">
          더 보기
        </button>
      </div>
    </aside>
  </div>

  <!-- ── RUN MODAL ──────────────────────────────────────────── -->
  <div id="run-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-full max-w-md">
      <div class="px-5 py-4 border-b border-gray-800 flex items-center justify-between">
        <h3 class="font-bold text-green-400">▶ Job 실행</h3>
        <button onclick="App.closeRunModal()" class="text-gray-500 hover:text-gray-300 text-xl leading-none">×</button>
      </div>
      <div class="px-5 py-4">
        <p id="modal-job-name" class="text-sm text-gray-300 mb-4"></p>
        <div id="modal-params" class="space-y-3"></div>
      </div>
      <div class="px-5 py-3 border-t border-gray-800 flex justify-end gap-3">
        <button onclick="App.closeRunModal()"
          class="px-4 py-1.5 rounded bg-gray-800 hover:bg-gray-700 text-sm text-gray-300 transition">취소</button>
        <button onclick="App.submitRun()"
          class="px-4 py-1.5 rounded bg-green-600 hover:bg-green-500 text-sm text-white font-semibold transition">
          ▶ 실행하기
        </button>
      </div>
    </div>
  </div>

  <!-- ── LOG HISTORY MODAL ──────────────────────────────────── -->
  <div id="log-modal" class="hidden fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-4">
    <div class="bg-gray-900 border border-gray-700 rounded-xl shadow-2xl w-full max-w-3xl h-[70vh] flex flex-col">
      <div class="px-5 py-4 border-b border-gray-800 flex items-center justify-between">
        <div>
          <h3 class="font-bold text-gray-200" id="lm-title">실행 로그</h3>
          <p class="text-xs text-gray-500 mt-0.5" id="lm-meta"></p>
        </div>
        <button onclick="App.closeLogModal()" class="text-gray-500 hover:text-gray-300 text-xl leading-none">×</button>
      </div>
      <div id="lm-log" class="flex-1 overflow-y-auto px-5 py-3 text-xs leading-5 text-green-300 bg-gray-950 font-mono whitespace-pre-wrap">
      </div>
    </div>
  </div>

  <!-- ── TOAST ──────────────────────────────────────────────── -->
  <div id="toast-container" class="fixed bottom-5 right-5 z-[100] space-y-2 flex flex-col items-end"></div>

  <script src="/static/app.js"></script>
</body>
</html>
